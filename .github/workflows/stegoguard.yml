name: StegoGuard Image Forensics

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  image-forensics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show lab mode
        run: cat lab_mode.txt

      - name: Create demo image
        run: python make_demo_image.py

      - name: Save generated image into repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/student_image.png
          git commit -m "Save generated image [skip ci]" || echo "No image changes to commit"
          git push

      - name: Upload generated image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-stegoguard-image
          path: images/student_image.png
          retention-days: 30

      - name: Run StegoGuard scanner
        run: python scanner.py
