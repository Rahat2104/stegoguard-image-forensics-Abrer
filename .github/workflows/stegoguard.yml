name: StegoGuard Image Forensics

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  image-forensics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show lab mode
        run: cat lab_mode.txt

      - name: Create demo image
        run: python make_demo_image.py

      - name: Save generated image
        uses: actions/upload-artifact@v4
        with:
          name: generated-stegoguard-image
          path: images/student_image.png
          retention-days: 30

      - name: Run StegoGuard scanner
        run: python scanner.py
